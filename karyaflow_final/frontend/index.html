<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KaryaFlow HR — People, Managed Right</title>
<meta name="description" content="KaryaFlow HR — Enterprise Human Resource Management. Manage employees, leaves, tasks & attendance."/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/css/styles.css" rel="stylesheet"/>
<style>
body { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="w-full max-w-md mx-auto px-md">
  <!-- Logo -->
  <div class="text-center mb-xl animate-in">
    <div class="inline-flex items-center gap-sm mb-md">
      <span style="font-family:Syne;font-size:36px;font-weight:700;color:#17243D;">KaryaFlow</span>
      <span style="font-family:Syne;font-size:36px;font-weight:700;color:#ffc250;">HR</span>
    </div>
    <p class="text-on-surface-variant" style="font-size:16px;line-height:24px;">People, managed right.</p>
  </div>

  <!-- Portal Cards -->
  <div class="space-y-md">
    <a href="/admin/" id="admin-portal-card" class="animate-in animate-delay-1 block bg-white rounded-xl p-lg border border-outline-variant hover:border-primary hover:shadow-lg transition-all duration-300 group cursor-pointer" style="text-decoration:none;">
      <div class="flex items-center gap-md">
        <div class="w-12 h-12 rounded-xl bg-primary-container flex items-center justify-center group-hover:scale-110 transition-transform" style="width:48px;height:48px;">
          <span class="material-symbols-outlined text-white" style="font-size:24px;">admin_panel_settings</span>
        </div>
        <div class="flex-1">
          <h2 style="font-family:Syne;font-size:20px;font-weight:600;color:#020e27;margin:0;">Admin Console</h2>
          <p style="font-size:14px;color:#45474d;margin:4px 0 0;">Manage employees, leaves, tasks &amp; attendance</p>
        </div>
        <span class="material-symbols-outlined text-outline-variant group-hover:text-primary group-hover:translate-x-1 transition-all">arrow_forward</span>
      </div>
    </a>

    <a href="/employee/" id="employee-portal-card" class="animate-in animate-delay-2 block bg-white rounded-xl p-lg border border-outline-variant hover:border-secondary hover:shadow-lg transition-all duration-300 group cursor-pointer" style="text-decoration:none;">
      <div class="flex items-center gap-md">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform" style="background:#ffc250;width:48px;height:48px;">
          <span class="material-symbols-outlined" style="font-size:24px;color:#5f4100;">person</span>
        </div>
        <div class="flex-1">
          <h2 style="font-family:Syne;font-size:20px;font-weight:600;color:#020e27;margin:0;">Employee Portal</h2>
          <p style="font-size:14px;color:#45474d;margin:4px 0 0;">View tasks, apply for leave &amp; track attendance</p>
        </div>
        <span class="material-symbols-outlined text-outline-variant group-hover:text-secondary group-hover:translate-x-1 transition-all">arrow_forward</span>
      </div>
    </a>
  </div>

  <!-- Footer -->
  <p class="text-center mt-xl animate-in animate-delay-3" style="font-size:12px;color:#9BA5B5;">KaryaFlow HR &bull; Enterprise Human Resource Management</p>
</div>
</body>
</html>
